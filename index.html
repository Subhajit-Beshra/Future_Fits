<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira+Stencil+One&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel = "stylesheet" href = "style.css">
    <title>Future Fits</title>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <a href="#"><img src="best option.png" alt="picture"></a>
            </div>
            <div class="Navlink">
                <a href="#Home" class="home">Home</a>
                <a href="#Shop" class="shop">Shop</a>
                <a href="#Categories" class="categories">Categories</a>
                <a href="#Contact" class="contact">Contact</a>
            </div>
            <!-- <div class="Search_bar">
                <input type = "text" placeholder="Search Items">
                <span class="material-symbols-outlined">
                    search
                </span>
            </div> -->
            <div class="Profile-Cart">
                <div class="Profile">
                    <span class="material-symbols-outlined">
                        account_circle
                    </span>
                    <div class="dropdown">
                        <div class="dropdown-info">
                            <div class="sign-in">
                                <p>New Customer?</p>
                                <a href="Sign-in.html">Start here</a>
                            </div>
                            <div class="dropdown-items">
                                <a href="#profile" id="id1">👤 My Profile</a>
                                <a href="#orders" id="id2">📦 Orders</a>
                                <a href="#wishlist" id="id3">❤ Wishlist</a>
                                <a href="#seller" id="id4">🏪 Become a Seller</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="Cart">
                    <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
                        fill="currentColor" viewBox="0 0 24 24" >
                        <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                        <path d="M21 4H6.17l-.18-1.15A1 1 0 0 0 5 2H2v2h2.14l1.87 12.15A1 1 0 0 0 7 17h12v-2H7.86l-.31-2H19c.45 0 .84-.3.96-.73l2-7A1 1 0 0 0 21 3.99Zm-2.75 7H7.24l-.77-5h13.2l-1.43 5ZM8 18a2 2 0 1 0 0 4 2 2 0 1 0 0-4m9 0a2 2 0 1 0 0 4 2 2 0 1 0 0-4"></path>
                        </svg>
                    <p>Cart</p>
                </div>
            </div>
        </div>
        <div class="hero-section">
            <div class="description">
                <div class="heading">
                    <h2>WEAR THE FUTURE</h2>
                    <p>Next-gen streetwear for bold minds.</p>
                </div>
                <div class="buttons">
                    <div class="shop">
                        <button id = "shopBtn">
                            <span class="material-symbols-outlined">
                            shopping_bag
                            </span>
                            Shop Now</button>
                    </div>
                    <div class="learn">

                        <button id="learnBtn">
                            <span class="material-symbols-outlined">
                            info
                            </span>
                            Learn More</button>
                    </div>
                </div>
            </div>
            <div class="image">
                <img src="tshirt.webp" alt="T-shirt">
            </div>
        </div>
        <br></br>
        <div class="feature-product">
            <div class="title-sec">
                <h2>FEATURED PRODUCT</h2>
                <div class="view-sec">
                    <p>view all</p>
                    <span class="material-symbols-outlined">
                     arrow_forward_ios
                    </span>
                </div>
            </div>
            <div class="featured-card">
                <div class="f-card">
                    <img src="black.webp" alt ="Cool T-shirt">
                    <h3>T-shirt</h3>
                    <h4>💰280</h4>
                    <button id="cartBtn">Add to Cart</button>
                </div>
                <div class="f-card">
                    <img src="hoodie.webp" alt="Cool Hoodie">
                    <h3>Hoddie</h3>
                    <h4>💰430</h4>
                    <button id="cartBtn">Add to Cart</button>
                </div>
                <div class="f-card">
                    <img src="jacket.webp" alt=" Cool Jacket">
                    <h3>Jacket</h3>
                    <h4>💰750</h4>
                    <button id="cartBtn">Add to Cart</button>
                </div>
                <div class="f-card">
                    <img src="cap.webp" alt="Cool Cap">
                    <h3>Cap</h3>
                    <h4>💰300</h4>
                    <button id="cartBtn">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
    <script src = "script.js"></script>
</body>
</html>

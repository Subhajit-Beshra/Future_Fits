<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira+Stencil+One&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="icon" href="../../assests/images/Favicon.png" type="image/png">
    <link rel="stylesheet" href="../../css/Invoice.css">
    <title>Invoice Section</title>
</head>
<body>
    <button id="print-btn">Print Invoice</button>
    <div class="container">
        <div class="heading">
            <div class="company-section">
                <div class="company-heading">
                    <img src="../../assests/images/Favicon.png" alt="Company-Icon">
                    <h2 class = "gradient-text">FUTURE_FITS</h2>
                </div>
                <div class="company-address">
                    <p>123, Business Street</p>
                    <p>Kolkata, West Bengal, 700001</p>
                    <p>Email: Info@yourcompany.com</p>
                    <p>Phone: 1234567890</p>
                </div>
            </div>
            <div class="invoice-section">
                <h1>INVOICE</h1>
            </div>
        </div>
        <div class="content">
            <div class="subcontent-1">
                <div class="address">
                    <h4>Bill To:</h4>
                    <div class="add-info">
                        <p id="address"></p>
                        <p id="city"></p>
                        <p id="state"></p>
                        <p id="code"></p>
                        <p id="country"></p>
                    </div>
                </div>
                <div class="product-details"></div>
            </div>
            <div class="subcontent-2">
                <div class="total-price"></div>
            </div>
        </div>
        <div class="footer">
            <p>Thank you for your business!</p>
        </div>
    </div>
    <script type="module" src="../../js/Invoice.js"></script>
</body>
</html>

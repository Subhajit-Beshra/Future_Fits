<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Optimized fonts - removed Material Symbols (replaced with SVGs) and reduced variants -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Poppins:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Load non-critical fonts asynchronously -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500&family=Ubuntu:wght@400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500&family=Ubuntu:wght@400;500&display=swap"></noscript>
    
    <link rel="stylesheet" href="../../css/dashboard.css">
    
    <!-- Critical CSS to prevent layout shift during font load -->
    <style>
        body { font-family: 'Montserrat', 'Poppins', sans-serif; }
        .material-symbols-outlined { display: inline-flex; align-items: center; justify-content: center; }
    </style>
    
    <title>Dashboard - Future Fits</title>
</head>
<body>
    <div class="container">
        <div class="sub-container-1">
            <div class="heading">
                <h2 class="gradient-text">FUTURE_FITS</h2>
            </div>
            <div class="sections">
                <button class="section-btn active" data-section="profile">
                    <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                    </svg>
                    <h3>Profile</h3>
                </button>
                <button class="section-btn" data-section="orders">
                    <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M18 6h-2c0-2.66-2.16-4.84-4.84-4.84S6.32 3.34 6.32 6H4c-1.1 0-1.99.9-1.99 2L2 19c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-2c1.66 0 3.04 1.34 3.2 3H7.8c.16-1.66 1.54-3 3.2-3zm7 13H4V8h14v9z"/>
                    </svg>
                    <h3>Orders</h3>
                </button>
                <button class="section-btn" data-section="wishlist">
                    <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                    <h3>Wishlist</h3>
                </button>
                <button class="section-btn" data-section="addresses">
                    <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                    <h3>Checkout</h3>
                </button>

                <button class="section-btn" data-section="settings">
                    <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.62l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.09-.47 0-.59.22L2.74 8.87c-.12.21-.08.48.1.62l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.62l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.48-.12-.62l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                    </svg>
                    <h3>Settings</h3>
                </button>
                <button class="section-btn" id="log-out-btn" data-section="log-out">
                    <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                    </svg>
                    <h3>Log-out</h3>
                </button>
            </div>
        </div>
        <div class="sub-container-2">
            <div class="nav-section">
                <a href="../../index.html" class="home">Home</a>
                <a href="../Shop/Shop.html" class="shop">Shop</a>
                <a href="../../index.html#Categories" class="categories">Categories</a>
                <a href="../Contact/Contact.html" class="contact">Contact</a>
            </div>
            <div class="content-section">
                <div class = "profile-section active">
                    <div class="title">
                        <h2>Profile</h2>
                        <br>
                        <p>Manage your personal information and account settings.</p>
                    </div>
                    <div class="profile-data">
                        <div class="user-data">
                            <div class="user-data-1">
                                <div class="img-circle" id="profile-img-circle">
                                    <img id="profile-img" src="" alt="Profile picture" style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
                                    <svg class="icon" id="camera-icon" viewBox="0 0 24 24" width="40" height="40" fill="currentColor">
                                        <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                                    </svg>
                                    <input type="file" id="imgUpload" accept="image/*" style="display:none;">
                                </div>
                                <div class="informations">
                                    <h2 id = "profile-name">Name</h2>
                                    <p id = "profile-email">email@gmail.com</p>
                                </div>
                            </div>
                            <div class="user-data-2">
                                <div class="user-details-1">
                                    <div class="profile_item">
                                        <div class="profile__content">
                                            <div class="content_value1">
                                                <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                                                </svg>
                                            </div>
                                            <div class="content_value2">
                                                <span class="profile__label">Full Name</span>
                                                <span class="profile__value" id = "profile-fullname"></span>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="profile_item">
                                        <div class="profile__content">
                                            <div class="content_value1">
                                                <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                                                    <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                                                </svg>
                                            </div>
                                            <div class="content_value2">
                                                <span class="profile__label">Email</span>
                                                <span class="profile__value" id = "profile-emailvalue"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="user-details-2">
                                    <div class="profile_item">
                                        <div class="profile__content">
                                            <div class="content_value1">
                                                <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                                                    <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/>
                                                </svg>
                                            </div>
                                            <div class="content_value2">
                                                <span class="profile__label">Joined</span>
                                                <span class="profile__value" id = "joined-date"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="user-data-edit">
                                <div class="prof-edit">
                                    <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                                        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/>
                                        <path d="M20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                                    </svg>
                                    <a href="#">Edit Profile</a>
                                </div>
                                <!-- <div class="pass-change">
                                    <a href="#">
                                        <svg class="icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5s-5 2.24-5 5v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
                                        </svg>
                                        Change Password
                                    </a>
                                </div> -->
                            </div>
                        </div>
                    </div>
                </div>
                <div class="order-section hidden" id="orders">Orders</div>  
                <div class="wishlist-section hidden" id="wishlist">Wishlist</div>
                <div class="checkout-section hidden" id="addresses">
                    
                </div>
                <div class="settings-section hidden" id="settings">Settings</div>
                <div class="log-out-section hidden" id="log-out">Log Out</div>  
            </div>
        </div>
    </div>
    <script type="module" defer src="../../js/dashboard.js"></script>
</body>
</html>

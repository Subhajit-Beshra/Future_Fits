<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira+Stencil+One&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="../../css/dashboard.css">
    <title></title>
</head>
<body>
    <div class="container">
        <div class="sub-container-1">
            <div class="heading">
                <h2 class="gradient-text">FUTURE_FITS</h2>
            </div>
            <div class="sections">
                <button onclick="showSection(this, 'profile')" class="section-btn active">
                    <span class="material-symbols-outlined">
                        person
                    </span>
                    <h3>Profile</h3>
                </button>
                <button onclick="showSection(this, 'orders')" class="section-btn">
                    <span class="material-symbols-outlined">
                        shopping_bag
                    </span>
                    <h3>Orders</h3>
                </button>
                <button onclick="showSection(this, 'wishlist')" class="section-btn">
                    <span class="material-symbols-outlined">
                        favorite
                    </span>
                    <h3>Wishlist</h3>
                </button>
                <button onclick="showSection(this, 'settings')" class="section-btn">
                    <span class="material-symbols-outlined">
                        settings
                    </span>
                    <h3>Settings</h3>
                </button>
                <button onclick="showSection(this, 'log-out')" id="log-out-btn" class="section-btn">
                    <span class="material-symbols-outlined">
                        logout
                    </span>
                    <h3>Log-out</h3>
                </button>
            </div>
        </div>
        <div class="sub-container-2">
            <div class="nav-section">
                <a href="../../index.html" class="home">Home</a>
                <a href="../Shop/Shop.html" class="shop">Shop</a>
                <a href="../../index.html#Categories" class="categories">Categories</a>
                <a href="../Contact/Contact.html" class="contact">Contact</a>
            </div>
            <div class="content-section">
                <div class="title">
                    <h2>Profile</h2>
                    <br>
                    <p>Manage your personal information and account settings.</p>
                </div>
                <div class="profile-data">
                    <div class="user-data">
                        <div class="user-data-1">
                            <div class="img-circle" id="profile-img-circle">
                                <img id="profile-img" src="" alt="" style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
                                <span class="material-symbols-outlined" id="camera-icon">photo_camera</span>
                                <input type="file" id="imgUpload" accept="image/*" style="display:none;">
                            </div>
                            <div class="informations">
                                <h2 id = "profile-name">Name</h2>
                                <p id = "profile-email">email@gmail.com</p>
                            </div>
                        </div>
                        <div class="user-data-2">
                            <div class="user-details-1">
                                <div class="profile_item">
                                    <div class="profile__content">
                                        <div class="content_value1">
                                            <span class="material-symbols-outlined">
                                                person
                                            </span>
                                        </div>
                                        <div class="content_value2">
                                            <span class="profile__label">Full Name</span>
                                            <span class="profile__value" id = "profile-fullname"></span>
                                        </div>
                                    </div>
                                </div>

                                <div class="profile_item">
                                    <div class="profile__content">
                                        <div class="content_value1">
                                            <span class="material-symbols-outlined">
                                                mail
                                            </span>
                                        </div>
                                        <div class="content_value2">
                                            <span class="profile__label">Email</span>
                                            <span class="profile__value" id = "profile-emailvalue"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="user-details-2">
                                <div class="profile_item">
                                    <div class="profile__content">
                                        <div class="content_value1">
                                            <span class="material-symbols-outlined">
                                                calendar_today
                                            </span>
                                        </div>
                                        <div class="content_value2">
                                            <span class="profile__label">Joined</span>
                                            <span class="profile__value" id = "joined-date"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="user-data-edit">
                            <div class="prof-edit">
                                <span class="material-symbols-outlined">
                                    edit
                                </span>
                                <a href="#">Edit Profile</a>
                            </div>
                            <!-- <div class="pass-change">
                                <a href="#">
                                    <span class="material-symbols-outlined">
                                        lock
                                    </span>Change Password
                                </a>
                            </div> -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type = "module" src="../../js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira+Stencil+One&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../../css/Shipping.css">
    <title>Shipping Section</title>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <a href="../../index.html"><img src="../../assests/images/best option.png" alt="picture"></a>
            </div>    
        </div>
    </div>
    <div class="shipping-container">
        <div class="shipping-section">
            <div class="title-section">
                <div class="icons">
                    <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
                        fill="currentColor" viewBox="0 0 24 24" >
                        <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                        <path d="M19.1 7.8c-.38-.5-.97-.8-1.6-.8H15V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2 0 1.65 1.35 3 3 3s3-1.35 3-3h4c0 1.65 1.35 3 3 3s3-1.35 3-3c1.1 0 2-.9 2-2v-3.67c0-.43-.14-.86-.4-1.2zM17.5 9l1.5 2h-4V9zM7 19a1.003 1.003 0 0 1-.87-1.5c.37-.63 1.36-.63 1.73 0 .09.15.13.32.13.49 0 .55-.45 1-1 1Zm2.23-3s-.05-.05-.08-.07c-.06-.06-.12-.11-.17-.16-.12-.11-.25-.21-.38-.29a3 3 0 0 0-.67-.32c-.07-.02-.14-.05-.21-.07Q7.375 15 7 15c-.375 0-.49.04-.72.09-.07.02-.14.05-.21.07-.16.05-.31.11-.45.19-.07.04-.15.08-.22.13-.13.09-.26.18-.38.29-.06.05-.12.1-.18.16-.02.03-.05.04-.08.07h-.77V6h9v10H9.22ZM17 19a1.003 1.003 0 0 1-.87-1.5c.37-.63 1.36-.63 1.73 0 .09.15.13.32.13.49 0 .55-.45 1-1 1Zm3-3h-.77s-.05-.05-.08-.07c-.06-.06-.12-.11-.17-.16-.12-.11-.25-.21-.38-.29a3 3 0 0 0-.67-.32c-.07-.02-.14-.05-.21-.07Q17.375 15 17 15c-.375 0-.47.04-.7.09-.06.01-.12.03-.18.05-.18.06-.36.13-.52.22l-.12.06c-.17.1-.33.21-.48.35v-2.76h5v3Z"></path>
                    </svg>
                </div>
                <div class="heading">
                    <h2>Shipping Information</h2>
                    <p>Please provide your delivery address</p>
                </div>
            </div>
            <div class="input-section">
                <div class="name-section">
                    <div class="full-name">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="full-name" placeholder="Enter your full name" required>
                    </div>
                    <div class="phone-num">
                        <label for="number">Phone Number</label>
                        <input type="tel" id="number" name="phone-num" placeholder="Enter your phone number" required>
                    </div>
                </div>
                <div class="email-section">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>
                <div class="address-section">
                    <label for="address">Street Address</label>
                    <input type="text" id="address" name="address" placeholder="House number and street name" required>
                </div>
                <div class="place-section">
                    <div class="city-section">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="Enter your city" required>
                    </div>
                    <div class="state-section">
                        <label for="state">State</label>
                        <select id="state" name="state">
                            <option value="purpose">Select State</option>
                        </select>
                    </div>
                    <div class="code-section">
                        <label for="code">PIN Code</label>
                        <input type="text" id="code" name="code" placeholder="Enter PIN Code" required>
                    </div>
                </div>
                <div class="country-section">
                    <label for="country">Country</label>
                    <select id="country" name="country">
                        <option value="India">India</option>
                    </select>
                </div>
            </div>
            <div class="button-section">
                <div class="save-btn">
                    <input type="checkbox" id="save" name="save" checked>
                    <label for="save">Save my details for next time</label>
                </div>
                <div class="continue-btn">
                    <button id="continue-btn">Continue to payment</button>
                </div>
            </div>
        </div>
        <div class="order-section">
            <div class="order">

                <div class="title-section">
                    <div class="icon">
                        <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
                            fill="currentColor" viewBox="0 0 24 24" >
                            <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                            <path d="M12 2C9.24 2 7 4.24 7 7v1H4c-.55 0-1 .45-1 1v11c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V9c0-.55-.45-1-1-1h-3V7c0-2.76-2.24-5-5-5M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v1H9zm10 3v10H5V10z"></path>
                        </svg>
                    </div>
                    <div class="title">
                        <h2>Order Summary</h2>
                    </div>
                </div>
                <div class="product-information"></div>
                <div class="cost-section"></div>

            </div>
            <div class="secure-section">
                <div class="icon">
                    <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
                        fill="currentColor" viewBox="0 0 24 24" >
                        <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                        <path d="m20.42 6.11-7.97-4c-.28-.14-.62-.14-.9 0l-7.97 4c-.31.15-.51.45-.55.79-.01.11-.96 10.76 8.55 15.01a.98.98 0 0 0 .82 0C21.91 17.66 20.97 7 20.95 6.9a.98.98 0 0 0-.55-.79ZM12 19.9C5.26 16.63 4.94 9.64 5 7.64l7-3.51 7 3.51c.04 1.99-.33 9.02-7 12.26"></path><path d="m11 12.59-1.29-1.3-1.42 1.42 2.71 2.7 4.71-4.7-1.42-1.42z"></path>
                    </svg>
                </div>
                <div class="title">
                    <div class="heading">
                        <h4>Secure & Safe</h4>
                        <p>Your personal information is encrypted and safe with us.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/Shipping.js"></script>
</body>
</html>
